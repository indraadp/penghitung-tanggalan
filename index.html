<body>

  <div class="wrapper">

    <h1>PENGHITUNG TANGGALAN</h1>
    <p class="subtitle">Penghitung tanggalan online untuk menghitung tanggal berdasarkan penambahan jumlah hari dari tanggal tertentu.</p>

    <form id="dateForm">

      <div class="card">

        <div class="card-header">
          <h2 class="startdate">Tanggal Mulai</h2>
          <button type="button" id="todayBtn" class="today-btn">Hari Ini</button>
        </div>

        <div class="date-row">

          <div class="field">
            <input type="number" id="day" placeholder="10" required>
          </div>

          <div class="field">
            <select id="month"></select>
          </div>

          <div class="field">
            <select id="year"></select>
          </div>

        </div>

        <p id="errorMessage" class="error"></p>

      </div>


      <div class="card">

        <h2>Tambahkan Hari</h2>

        <div class="form-group-inline">
          <input type="number" id="addDays" placeholder="Masukkan jumlah hari" required>
          <span>Hari</span>
        </div>

      </div>


      <button type="submit">Hitung Tanggal</button>

    </form>


    <div class="result">
      <h3>Hasil Tanggal:</h3>
      <p id="resultDate">-</p>
    </div>

  </div>
